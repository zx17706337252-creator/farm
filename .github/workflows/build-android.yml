# ============================================================
# 呆柳的农场 - Flutter Android APK 自动构建
# GitHub Actions (免费) - 每次推送到 main 分支或手动触发
# 构建完成后，APK 作为 artifact 上传到 Run 页面，可直接下载
# ============================================================

name: Flutter Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Ensure android/ directory exists
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            echo "==> android/ 目录不存在，用 flutter create 自动生成"
            flutter create --platforms=android \
                           --project-name=flutter_farmlife \
                           --org=com.dailiu.farm \
                           --no-pub \
                           .
          else
            echo "==> android/ 目录已存在"
          fi

      - name: Fix Kotlin version in Gradle files
        shell: python
        run: |
          import re, os
          target = '1.9.22'
          for f in ['android/build.gradle', 'android/settings.gradle']:
              if not os.path.exists(f):
                  print(f'{f}: 不存在，跳过'); continue
              with open(f, 'r', encoding='utf-8') as fp:
                  content = fp.read()
              new = content
              # 匹配 kotlin_version = "x.y.z"
              new = re.sub(r"(kotlin_version\s*=\s*)['\"][\d.]+['\"]",
                           lambda m, t=target: f"{m.group(1)}\"{t}\"", new)
              # 匹配 id "org.jetbrains.kotlin.android" version "x.y.z"
              new = re.sub(r'(id\s+["\']org\.jetbrains\.kotlin\.android["\']\s+version\s+)["\'][\d.]+["\']',
                           lambda m, t=target: f"{m.group(1)}\"{t}\"", new)
              # 匹配 org.jetbrains.kotlin:kotlin-gradle-plugin:x.y.z
              new = re.sub(r'(org\.jetbrains\.kotlin:kotlin-gradle-plugin:)[\d.]+',
                           lambda m, t=target: f"{m.group(1)}{t}", new)
              if new != content:
                  with open(f, 'w', encoding='utf-8') as fp:
                      fp.write(new)
                  print(f'{f}: 已更新 Kotlin 到 {target}')
              else:
                  print(f'{f}: 无需更新')
          # 验证
          for f in ['android/build.gradle', 'android/settings.gradle']:
              if os.path.exists(f):
                  with open(f) as fp:
                      print(f'\n=== {f} (kotlin 相关) ===')
                      for line in fp:
                          if 'kotlin' in line.lower():
                              print('  ' + line.rstrip()[:150])

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze --no-fatal-infos || true

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-farmlife-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

name: flutter_farmlife
description: 呆柳的农场 - Flutter 跨平台版
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # 状态管理 - Riverpod
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # 本地存储 - shared_preferences (JSON存储)
  shared_preferences: ^2.2.2

  # 工具库
  intl: ^0.18.1
  uuid: ^4.3.3

  # UI增强
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
